name: Build Kernel Avancé (xiaoleGun Mod)
on:
  workflow_dispatch:

jobs:
  build:
    name: Compilation du Noyau par ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
    steps:
    - name: Récupération du dépôt de build
      uses: actions/checkout@v4

    - name: Chargement de la tour de contrôle (config.env)
      run: |
        if [ -f "config.env" ]; then
          while IFS= read -r line || [ -n "$line" ]; do
            clean_line=$(echo "$line" | tr -d '\r')
            clean_line=$(echo "$clean_line" | sed 's/#.*//')
            clean_line=$(echo "$clean_line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            if [ -n "$clean_line" ] && [[ "$clean_line" == *=* ]]; then
              echo "$clean_line" >> $GITHUB_ENV
            fi
          done < config.env
          echo "[+] Fichier config.env ingéré et nettoyé avec succès."
        else
          echo "[-] Erreur critique : Fichier config.env manquant."
          exit 1
        fi

    - name: Nettoyage et optimisation de l'espace disque
      if: env.REMOVE_UNUSED_PACKAGES == 'true'
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: false
        dotnet: true
        haskell: true
        large-packages: false
        docker-images: true
        swap-storage: false

    - name: Configuration de la mémoire Swap (10 Go)
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Installation des dépendances Linux obligatoires
      run: |
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Téléchargement du compilateur optimisé (Custom Clang)
      if: env.USE_CUSTOM_CLANG == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        echo "[+] Clonage de la Toolchain personnalisée depuis ${{ env.CUSTOM_CLANG_SOURCE }}..."
        git clone ${{ env.CUSTOM_CLANG_SOURCE }} -b ${{ env.CUSTOM_CLANG_BRANCH }} clang-aosp --depth=1
        echo "$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin" >> $GITHUB_PATH

    - name: Téléchargement des compilateurs secondaires GCC
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [ "${{ env.ENABLE_GCC_ARM64 }}" = "true" ]; then
            mkdir gcc-64
            wget -O gcc-aarch64.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz
            tar -C gcc-64/ -zxvf gcc-aarch64.tar.gz
            echo "GCC_64_FLAG=CROSS_COMPILE=$GITHUB_WORKSPACE/kernel_workspace/gcc-64/bin/aarch64-linux-android-" >> $GITHUB_ENV
        fi
        if [ "${{ env.ENABLE_GCC_ARM32 }}" = "true" ]; then
            mkdir gcc-32
            wget -O gcc-arm.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz
            tar -C gcc-32/ -zxvf gcc-arm.tar.gz
            echo "GCC_32_FLAG=CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/kernel_workspace/gcc-32/bin/arm-linux-androideabi-" >> $GITHUB_ENV
        fi

    - name: Téléchargement du code source du Noyau (Kernel)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1

    - name: Intégration et Patching de KernelSU (${{ env.KERNELSU_TAG }})
      if: env.ENABLE_KERNELSU == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        echo "[+] Récupération propre des sources KernelSU..."
        rm -rf drivers/kernelsu drivers/kernelsu-repo $GITHUB_WORKSPACE/kernel_workspace/KernelSU-tmp
        
        # 1. Clonage temporaire et copie physique
        git clone https://github.com/tiann/KernelSU.git -b ${{ env.KERNELSU_TAG }} $GITHUB_WORKSPACE/kernel_workspace/KernelSU-tmp
        mkdir -p drivers/kernelsu
        cp -r $GITHUB_WORKSPACE/kernel_workspace/KernelSU-tmp/kernel/* drivers/kernelsu/
        rm -rf $GITHUB_WORKSPACE/kernel_workspace/KernelSU-tmp
        
        # 2. FORCE TOTAL SUR LE MAKEFILE INTERNE (Contourne les structures conditionnelles et ifeq)
        if [ -f "drivers/kernelsu/Makefile" ]; then
            sed -i 's/obj-\$(CONFIG_KERNELSU)/obj-y/g' drivers/kernelsu/Makefile
            sed -i 's/obj-\$(CONFIG_KSU)/obj-y/g' drivers/kernelsu/Makefile
            sed -i 's/kernelsu-\$(CONFIG_KERNELSU)/kernelsu-y/g' drivers/kernelsu/Makefile
            sed -i 's/ksu-\$(CONFIG_KSU)/ksu-y/g' drivers/kernelsu/Makefile
            sed -i 's/ifeq (\$(CONFIG_KERNELSU),y)/ifeq (y,y)/g' drivers/kernelsu/Makefile
            sed -i 's/ifeq (\$(CONFIG_KSU),y)/ifeq (y,y)/g' drivers/kernelsu/Makefile
            sed -i '1i ccflags-y += -DCONFIG_KERNELSU=1 -DCONFIG_KSU=1' drivers/kernelsu/Makefile
            echo "[+] Fichier drivers/kernelsu/Makefile configuré en mode inconditionnel."
        fi
        
        # 3. Injection du Hook fs/open.c (avec nettoyage de sécurité préalable)
        if [ -f "fs/open.c" ]; then
            echo "[+] Application propre du hook d'ouverture fs/open.c..."
            sed -i '/ksu_handle_open/d' fs/open.c
            sed -i '/int do_dentry_open(/,/^[}]/s/return 0;/{ extern int ksu_handle_open(struct file *file); ksu_handle_open(f); } return 0;/g' fs/open.c
        fi

        # 4. ANCRAGE DE SÉCURITÉ DANS DRIVERS/MAKEFILE (Juste après la compilation du framework de base)
        if [ -f "drivers/Makefile" ]; then
            sed -i '/kernelsu/d' drivers/Makefile
            sed -i '/obj-y.*base/a obj-y += kernelsu/' drivers/Makefile
            echo "[+] Liaison KernelSU ancrée de manière permanente après le sous-système 'base'."
        fi

        # 5. SÉCURISATION ANCRAGE KCONFIG (Via l'architecture globale ARM64 pour éviter les exclusions)
        if [ -f "arch/arm64/Kconfig" ]; then
            sed -i 's|source "drivers/Kconfig"|source "drivers/Kconfig"\nsource "drivers/kernelsu/Kconfig"|g' arch/arm64/Kconfig
            echo "[+] Déclaration Kconfig injectée au niveau de la racine d'architecture arm64."
        fi

        # 6. SÉCURISATION DES HEADERS GLOBALS
        if [ -f "include/linux/kconfig.h" ]; then
            echo "#define CONFIG_KERNELSU 1" >> include/linux/kconfig.h
            echo "#define CONFIG_KSU 1" >> include/linux/kconfig.h
        fi

    - name: Intégration et Patching Anti-Détection SusFS
      if: env.ENABLE_SUSFS == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        echo "[+] Téléchargement des patchs SusFS..."
        git clone ${{ env.SUSFS_PATCH_SOURCE }} -b ${{ env.SUSFS_PATCH_BRANCH }} susfs-src --depth=1
        
        cd android-kernel
        if [ -d "drivers/kernelsu" ]; then
            cp -r $GITHUB_WORKSPACE/kernel_workspace/susfs-src/kernel/* ./drivers/kernelsu/
            echo "[+] Fichiers SusFS injectés avec succès."
        fi

    - name: Configuration des Flags d'optimisation (Defconfig)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        CONFIG_PATH="arch/arm64/configs/${{ env.KERNEL_CONFIG }}"
        if [ -f "$CONFIG_PATH" ]; then
            sed -i '/CONFIG_KERNELSU/d' $CONFIG_PATH
            sed -i '/CONFIG_KSU/d' $CONFIG_PATH
            sed -i '/CONFIG_KPROBES/d' $CONFIG_PATH
            sed -i '/CONFIG_OVERLAY_FS/d' $CONFIG_PATH
            echo "CONFIG_KERNELSU=y" >> $CONFIG_PATH
            echo "CONFIG_KSU=y" >> $CONFIG_PATH
            echo "CONFIG_KPROBES=y" >> $CONFIG_PATH
            echo "CONFIG_OVERLAY_FS=y" >> $CONFIG_PATH
        fi

    - name: Exécution de la Compilation du Noyau (Moteur Clang + LLVM Tools)
      env:
        OBJCOPY: llvm-objcopy
        STRIP: llvm-strip
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
        
        # 1. Génération de la configuration brute avec flags passés en arguments durs
        make O=out ARCH=${{ env.ARCH }} ${{ env.GCC_64_FLAG }} ${{ env.GCC_32_FLAG }} CLANG_TRIPLE=aarch64-linux-gnu- CC=clang OBJCOPY=llvm-objcopy STRIP=llvm-strip ${{ env.KERNEL_CONFIG }} CONFIG_KERNELSU=y CONFIG_KSU=y
        
        # 2. Ré-injection de protection post-génération brute
        sed -i '/CONFIG_KERNELSU/d' out/.config
        sed -i '/CONFIG_KSU/d' out/.config
        sed -i '/CONFIG_KPROBES/d' out/.config
        sed -i '/CONFIG_OVERLAY_FS/d' out/.config
        echo "CONFIG_KERNELSU=y" >> out/.config
        echo "CONFIG_KSU=y" >> out/.config
        echo "CONFIG_KPROBES=y" >> out/.config
        echo "CONFIG_OVERLAY_FS=y" >> out/.config
        
        # 3. Synchronisation stricte (.config -> include/config/auto.conf)
        make O=out ARCH=${{ env.ARCH }} ${{ env.GCC_64_FLAG }} ${{ env.GCC_32_FLAG }} CLANG_TRIPLE=aarch64-linux-gnu- CC=clang OBJCOPY=llvm-objcopy STRIP=llvm-strip olddefconfig CONFIG_KERNELSU=y CONFIG_KSU=y
        
        # 4. Lancement du Build final
        echo "[+] Lancement de la compilation globale forcée..."
        make -j$(nproc --all) O=out ARCH=${{ env.ARCH }} ${{ env.GCC_64_FLAG }} ${{ env.GCC_32_FLAG }} CLANG_TRIPLE=aarch64-linux-gnu- CC=clang OBJCOPY=llvm-objcopy STRIP=llvm-strip CONFIG_KERNELSU=y CONFIG_KSU=y || BUILD_FAILED=true
        
        if [ "$BUILD_FAILED" = "true" ]; then
            echo "[-] Échec du build multi-cœurs. Tentative en mode diagnostic mono-cœur (-j1)..."
            make -j1 O=out ARCH=${{ env.ARCH }} ${{ env.GCC_64_FLAG }} ${{ env.GCC_32_FLAG }} CLANG_TRIPLE=aarch64-linux-gnu- CC=clang OBJCOPY=llvm-objcopy STRIP=llvm-strip CONFIG_KERNELSU=y CONFIG_KSU=y
        fi

    - name: Empaquetage flashable universel avec AnyKernel3
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone ${{ env.CUSTOM_ANYKERNEL3_SOURCE }} -b ${{ env.CUSTOM_ANYKERNEL3_BRANCH }} AnyKernel3 --depth=1
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' AnyKernel3/anykernel.sh
        sed -i 's/IS_SLOT_DEVICE=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
        
        KERNEL_OUTPUT="android-kernel/out/arch/arm64/boot/${{ env.KERNEL_IMAGE_NAME }}"
        if [ -f "$KERNEL_OUTPUT" ]; then
            cp "$KERNEL_OUTPUT" AnyKernel3/
            echo "ZIP_READY=true" >> $GITHUB_ENV
        else
            echo "[-] Erreur : L'image finale du noyau n'a pas pu être trouvée. Compilation avortée."
            exit 1
        fi

    - name: Exportation du fichier zip flashable (Artifact)
      if: env.ZIP_READY == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU_${{ env.KERNELSU_TAG }}_SusFS-${{ env.KERNEL_IMAGE_NAME }}
        path: kernel_workspace/AnyKernel3/*
