name: Build Kernel with KernelSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Maximiser l'espace disque
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 5120
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Checkout du code (Ton dépôt de workflow)
      uses: actions/checkout@v4

    - name: Installation des dépendances système
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils bison flex libelf-dev git lld llvm

    - name: Téléchargement du code source du Noyau (via Checkout)
      uses: actions/checkout@v4
      with:
        repository: 'xiaolegun/android_kernel_motorola_sm8250'
        ref: 'u-rel'
        path: 'kernel_workspace/android-kernel'
        fetch-depth: 1

    - name: Téléchargement de la Toolchain AOSP Clang
      run: |
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace
        cd $GITHUB_WORKSPACE/kernel_workspace
        echo "[+] Téléchargement de la Toolchain AOSP Clang..."
        git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b master-kernel-build-2022 clang --depth=1
    - name: Intégration de KernelSU
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        echo "[+] Installation de KernelSU..."
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

    - name: Configuration du Defconfig et Patches Drivers
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        
        # 1. APPLICATION DU PATCH TACTILE SYNAPTICS
        TARGET_SYNAPTICS="drivers/input/touchscreen/synaptics_dsx/synaptics_dsx_rmi_dev.c"
        if [ -f "$TARGET_SYNAPTICS" ]; then
            echo "[+] Patch du pilote tactile Synaptics..."
            sed -i '/linux\/sched\/signal.h/d' $TARGET_SYNAPTICS
            sed -i '2i #include <linux/sched/signal.h>' $TARGET_SYNAPTICS
            sed -i 's/send_sig_info(SIGTERM, \&rmidev->terminate_signal, rmidev->task);/send_sig(SIGTERM, rmidev->task, 0);/g' $TARGET_SYNAPTICS
            sed -i 's/send_sig_info(SIGIO, \&rmidev->interrupt_signal, rmidev->task);/send_sig(SIGIO, rmidev->task, 0);/g' $TARGET_SYNAPTICS
        fi

        # 2. CONFIGURATION DU DEFCONFIG
        CONFIG_PATH="arch/arm64/configs/vendor/kona-perf_defconfig"
        
        echo "[+] Nettoyage et injection des options KernelSU..."
        sed -i '/CONFIG_KERNELSU/d' $CONFIG_PATH
        sed -i '/CONFIG_KSU/d' $CONFIG_PATH
        sed -i '/CONFIG_KPROBES/d' $CONFIG_PATH
        sed -i '/CONFIG_OVERLAY_FS/d' $CONFIG_PATH
        
        echo "CONFIG_KERNELSU=y" >> $CONFIG_PATH
        echo "CONFIG_KSU=y" >> $CONFIG_PATH
        echo "CONFIG_KPROBES=y" >> $CONFIG_PATH
        echo "CONFIG_OVERLAY_FS=y" >> $CONFIG_PATH
        
        echo "[+] Désactivation des sécurités contraignantes (Anti-bootloop & Intégrité)..."
        sed -i '/CONFIG_MODULE_SIG/d' $CONFIG_PATH
        sed -i '/CONFIG_DM_VERITY/d' $CONFIG_PATH
        echo "CONFIG_MODULE_SIG=n" >> $CONFIG_PATH
        echo "CONFIG_MODULE_SIG_FORCE=n" >> $CONFIG_PATH
        echo "CONFIG_DM_VERITY=n" >> $CONFIG_PATH

    - name: Compilation du Noyau (Build)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        
        # 1. Définition et EXPORTATION du PATH au niveau du système (CRUCIAL)
        export CLANG_DIR=$GITHUB_WORKSPACE/kernel_workspace/clang/clang-r450784e
        export PATH=$CLANG_DIR/bin:$PATH
        
        # 2. Variables d'architecture
        export ARCH=arm64
        export SUBARCH=arm64
        
        echo "[+] Génération du fichier .config..."
        # L'ajout de HOSTCC=gcc force la compilation des outils hôtes avec les bons headers (fixe l'erreur elf.h)
        make O=out \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
          vendor/kona-perf_defconfig
        
        echo "[+] Lancement de la compilation complète..."
        make -j$(nproc) O=out \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          CC=clang \
          LLVM=1 \
          LLVM_IAS=1 \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
          KCFLAGS="-Wno-gnu-variable-sized-type-not-at-end -Wno-error -Wno-implicit-function-declaration -Wno-error=implicit-function-declaration"

    - name: Préparation de AnyKernel3
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 AnyKernel3
        
        # Vérification et copie du fichier Image.gz généré
        IMAGE_PATH="$GITHUB_WORKSPACE/kernel_workspace/android-kernel/out/arch/arm64/boot/Image.gz"
        if [ -f "$IMAGE_PATH" ]; then
            cp $IMAGE_PATH AnyKernel3/
            echo "[✓] Image.gz copiée avec succès dans AnyKernel3."
        else
            echo "[X] Erreur critique : Fichier Image.gz introuvable après la compilation !"
            exit 1
        fi

    - name: Téléversement du Kernel Flashable (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Kernel_Kona_KernelSU
        path: ${{ github.workspace }}/kernel_workspace/AnyKernel3/*
