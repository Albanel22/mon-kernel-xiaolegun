name: Build Kernel Personnalisé Motorola KernelSU + SusFS

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
    - name: Configuration de l'environnement de build
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils zlib1g-dev g++-multilib libxml2-utils bison flex git zip unzip curl liblz4-tool lzma
        
    - name: Chargement des Variables de Configuration
      run: |
        # Configuration des dépôts par défaut pour AnyKernel3
        echo "CUSTOM_ANYKERNEL3_SOURCE=https://github.com/osm0sis/AnyKernel3" >> $GITHUB_ENV
        echo "CUSTOM_ANYKERNEL3_BRANCH=master" >> $GITHUB_ENV

    - name: Récupération du Code Source du Noyau (Kernel)
      run: |
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace
        cd $GITHUB_WORKSPACE/kernel_workspace
        echo "[+] Clonage du dépôt LineageOS Motorola sm8250..."
        git clone https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-21 android-kernel --depth=1

    - name: Récupération de la Toolchain (Clang/Gcc)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        echo "[+] Téléchargement de la Toolchain AOSP Clang..."
        git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b master-kernel-build-2022 clang --depth=1

    - name: Injection et Patch de KernelSU & SusFS
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        echo "[+] Initialisation et injection du code KernelSU officiel..."
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

    - name: Configuration du Defconfig (Bannissement des verrous Motorola)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        # Recherche et ciblage automatique du fichier defconfig de la plateforme
        CONFIG_PATH="arch/arm64/configs/vendor/kona-perf_defconfig"
        if [ ! -f "$CONFIG_PATH" ]; then
            CONFIG_PATH=$(find arch/arm64/configs/ -name "*defconfig" | head -n 1)
        fi
        echo "[+] Fichier de configuration ciblé : $CONFIG_PATH"
        
        echo "[+] Nettoyage des anciennes configurations..."
        sed -i '/CONFIG_KERNELSU/d' $CONFIG_PATH
        sed -i '/CONFIG_KSU/d' $CONFIG_PATH
        sed -i '/CONFIG_KPROBES/d' $CONFIG_PATH
        sed -i '/CONFIG_OVERLAY_FS/d' $CONFIG_PATH
        sed -i '/CONFIG_MODULE_SIG/d' $CONFIG_PATH
        sed -i '/CONFIG_KALLSYMS/d' $CONFIG_PATH
        sed -i '/CONFIG_DM_VERITY/d' $CONFIG_PATH
        
        echo "[+] Injection des pré-requis obligatoires pour KernelSU..."
        echo "CONFIG_KERNELSU=y" >> $CONFIG_PATH
        echo "CONFIG_KSU=y" >> $CONFIG_PATH
        echo "CONFIG_KPROBES=y" >> $CONFIG_PATH
        echo "CONFIG_OVERLAY_FS=y" >> $CONFIG_PATH
        
        echo "[+] Activation de la cartographie complète du noyau..."
        echo "CONFIG_KALLSYMS=y" >> $CONFIG_PATH
        echo "CONFIG_KALLSYMS_ALL=y" >> $CONFIG_PATH
        
        echo "[+] Désactivation des verrous de signature LineageOS/Motorola (Anti-Bootloop)..."
        echo "CONFIG_MODULE_SIG=n" >> $CONFIG_PATH
        echo "CONFIG_MODULE_SIG_FORCE=n" >> $CONFIG_PATH
        echo "CONFIG_MODULE_SIG_PERMISSIVE=y" >> $CONFIG_PATH
        echo "CONFIG_MODULE_SIG_ALL=n" >> $CONFIG_PATH
        
        echo "[+] Désactivation des verrous de sécurité d'intégrité (AVB / DM-Verity)..."
        echo "CONFIG_STRICT_KERNEL_RWX=n" >> $CONFIG_PATH
        echo "CONFIG_DEBUG_LIST=n" >> $CONFIG_PATH
        echo "CONFIG_DM_VERITY=n" >> $CONFIG_PATH
        echo "CONFIG_DM_VERITY_VERIFY_ROOTHASH_SIGNATURE=n" >> $CONFIG_PATH
        
        echo "[+] Configuration finale du defconfig validée."

    - name: Compilation du Noyau (Build)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang/clang-r450784d/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        
        # Définition complète des outils LLVM pour éviter les conflits d'assembleur
        export CC=clang
        export LD=ld.lld
        export AR=llvm-ar
        export NM=llvm-nm
        export OBJCOPY=llvm-objcopy
        export OBJDUMP=llvm-objdump
        export STRIP=llvm-strip
        
        echo "[+] Lancement de la génération du fichier de configuration..."
        make O=out CC=clang LD=ld.lld CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- vendor/kona-perf_defconfig
        
        echo "[+] Compilation du noyau avec l'écosystème LLVM complet..."
        make -j$(nproc) O=out \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
          LLVM=1 \
          LLVM_IAS=1 \
          KCFLAGS="-w" \
          HOSTCFLAGS="-w"



    - name: Empaquetage flashable universel avec AnyKernel3
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        echo "[+] Récupération de AnyKernel3..."
        git clone ${{ env.CUSTOM_ANYKERNEL3_SOURCE }} -b ${{ env.CUSTOM_ANYKERNEL3_BRANCH }} AnyKernel3 --depth=1
        
        echo "[+] Configuration des scripts AnyKernel3..."
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' AnyKernel3/anykernel.sh
        sed -i 's/IS_SLOT_DEVICE=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
        
        echo "[+] Traitement du noyau brut (Format Image exigé par AIK/Motorola)..."
        KERNEL_RAW="android-kernel/out/arch/arm64/boot/Image"
        
        if [ -f "$KERNEL_RAW" ]; then
            echo "[+] Succès : Noyau brut trouvé dans les dossiers de build."
            cp "$KERNEL_RAW" AnyKernel3/Image
            echo "ZIP_READY=true" >> $GITHUB_ENV
        else
            echo "[-] Alerte : Le fichier brut 'Image' est introuvable au chemin principal."
            KERNEL_ALT=$(find android-kernel/out/arch/arm64/boot/ -maxdepth 1 -type f -name "Image*" | head -n 1)
            if [ -n "$KERNEL_ALT" ]; then
                echo "[+] Fichier alternatif trouvé : $KERNEL_ALT -> Forçage au format 'Image'"
                cp "$KERNEL_ALT" AnyKernel3/Image
                echo "ZIP_READY=true" >> $GITHUB_ENV
            else
                echo "[-] Erreur critique : Aucun binaire de noyau n'a été généré."
                exit 1
            fi
        fi

    - name: Création et Publication de l'Archive Flashable (Artifact)
      if: env.ZIP_READY == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/AnyKernel3
        zip -r9 ../KernelSU_v0.9.5_Motorola_sm8250_Image.zip *
        
    - name: Téléversement de l'Artifact vers GitHub
      if: env.ZIP_READY == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU_v0.9.5_Motorola_sm8250_Image
        path: kernel_workspace/KernelSU_v0.9.5_Motorola_sm8250_Image.zip
